name: Leaf
options:
  bundleIdPrefix: com.tunahan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"


  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.21.0"

schemes:
  Leaf:
    build:
      targets:
        Leaf: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Leaf:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - Leaf
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Sentry
        product: Sentry
    info:
      path: Leaf/Resources/Info.plist
      properties:
        CFBundleName: Leaf
        CFBundleDisplayName: Leaf
        CFBundleIdentifier: com.tunahan.leaf
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Leaf
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSPhotoLibraryUsageDescription: "Kitap kapaklarını galerinizden seçip ekleyebilmeniz için fotoğraf erişimine ihtiyaç vardır."
        NSCameraUsageDescription: "Kapak fotoğraflarını kameranızla çekebilmeniz için erişim gereklidir."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        GIDClientID: "948998031705-k92p4om7gbujmmrvflrps8vejqas5r4b.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleURLName: com.tunahan.leaf
            CFBundleURLSchemes:
              - com.tunahan.leaf
          - CFBundleURLName: Google Sign-In
            CFBundleURLSchemes:
              - com.googleusercontent.apps.948998031705-k92p4om7gbujmmrvflrps8vejqas5r4b
        SUPABASE_URL: "https://$(SUPABASE_DOMAIN)"
        SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
        SENTRY_DSN: "$(SENTRY_DSN)"
    entitlements:
      path: Leaf/Leaf.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tunahan.leaf
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "3"
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
